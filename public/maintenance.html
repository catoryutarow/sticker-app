<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>メンテナンス中 — シール帳</title>
  <style>
    :root {
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(180deg, #fdf6ff 0%, #eef4ff 100%);
      color: #1f2937;
    }
    main {
      max-width: 440px;
      width: 100%;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 20px;
      padding: 36px 28px 32px;
      text-align: center;
      box-shadow: 0 10px 40px -10px rgba(99, 102, 241, 0.25);
    }
    .logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 16px;
      border-radius: 18px;
      object-fit: cover;
    }
    h1 {
      font-size: 22px;
      margin: 0 0 12px;
      letter-spacing: 0.02em;
    }
    p {
      font-size: 15px;
      line-height: 1.7;
      margin: 0 0 12px;
      color: #4b5563;
    }
    .note {
      margin-top: 20px;
      font-size: 12px;
      color: #9ca3af;
    }
    .badge {
      display: inline-block;
      margin-bottom: 16px;
      padding: 4px 10px;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: #6366f1;
      background: rgba(99, 102, 241, 0.1);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <main>
    <img class="logo" src="/logo.png" alt="シール帳" onerror="this.style.display='none'" />
    <div class="badge">MAINTENANCE</div>
    <h1>ただいまメンテナンス中です</h1>
    <p>
      より良いサービス提供のため、<br />
      一時的にサイトを停止しています。
    </p>
    <p>復旧までしばらくお待ちください。</p>
    <p class="note">— Spollup Inc.</p>
  </main>
</body>
</html>
